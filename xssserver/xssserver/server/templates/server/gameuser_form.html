{% extends "./base.html" %}
{% load bootstrap5 %}
{% block content %}
<div class="container-lg pt-5">
    <div class="row justify-content-center">
        <div class="col-6">
            <h2>Register</h2>
            <form method="POST" class="form">
                {% csrf_token %}
                <div class="mb-3">
                    {% bootstrap_form form %}
                </div>
                <button class="btn btn-primary text-white" type="submit">Submit</button>
            </form>
        </div>
    </div>
</div>
{% endblock content%}
