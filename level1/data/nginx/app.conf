upstream targetserver {
    server targetserver:8000;
}

server {
    listen 80;
    server_name excess-level-one.youcanhack.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name excess-level-one.youcanhack.me;

    ssl_certificate /etc/letsencrypt/live/excess-level-one.youcanhack.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/excess-level-one.youcanhack.me/privkey.pem;

    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparam.pem;

    location / {
        proxy_pass http://targetserver;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }
}